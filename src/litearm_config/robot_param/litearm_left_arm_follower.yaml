robot:
  name: "LiteArm-A10-LeftArm-Follower"
  param_file: "litearm_left_arm_follower_motors.yaml"

# 遥操从臂目标直接映射主臂位置，不做限位夹紧（两臂同构，主臂物理行程即从臂行程）。
# ±5 仅作为 SDK checkJointLimits 的兜底，防止异常目标值；实际行程由机械限位决定。
joint_limits:
  lower: [-5.0, -5.0, -5.0, -5.0, -5.0, -5.0, -5.0]
  upper: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0]

urdf:
  file_path: "LiteArm_A10_251125.urdf"
  base_link: "base_link"
  end_effector_link: "l_joint7_link"

kinematics:
  joint_names:
    - "l_joint1_joint"
    - "l_joint2_joint"
    - "l_joint3_joint"
    - "l_joint4_joint"
    - "l_joint5_joint"
    - "l_joint6_joint"
    - "l_joint7_joint"

control:
  default_velocity: 0.5
  default_max_torque: 10.0
  position_tolerance: 0.01
  timeout: 10.0
